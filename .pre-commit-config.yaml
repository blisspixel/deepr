repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^(deploy/aws/template\.yaml|deploy/mcp-http/aws-ecs-fargate/template\.yaml)$
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: debug-statements
  - repo: local
    hooks:
      - id: file-size-ratchet
        name: file-size ratchet
        entry: python scripts/check_file_sizes.py
        language: system
        pass_filenames: false
        files: ^(src/deepr/.*\.py|scripts/check_file_sizes\.py)$
      - id: code-health-ratchets
        name: code-health ratchets
        entry: python scripts/check_ratchets.py
        language: system
        pass_filenames: false
        files: ^(src/deepr/.*\.py|scripts/check_ratchets\.py|pyproject\.toml)$
