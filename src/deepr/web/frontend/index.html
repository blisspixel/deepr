<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/deepr.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deepr - Research Automation Platform</title>
    <script>
      // Synchronous theme + accent application to prevent a flash of the wrong
      // colors (FOUC). Mirrors applyAppearance() in src/stores/ui-store.ts -
      // keep the ACCENTS map below in sync with that file.
      (function() {
        try {
          var stored = JSON.parse(localStorage.getItem('deepr-ui-store') || '{}');
          var state = stored.state || {};
          var theme = state.theme;
          var root = document.documentElement;
          var dark = theme === 'dark' ||
            ((theme === 'system' || !theme) &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          root.classList.add(dark ? 'dark' : 'light');

          var ACCENTS = {
            indigo:  ['243 55% 52%', '243 72% 72%'],
            blue:    ['217 80% 47%', '213 85% 66%'],
            violet:  ['262 60% 52%', '263 78% 73%'],
            emerald: ['158 70% 32%', '156 60% 48%'],
            amber:   ['32 90% 42%',  '38 92% 56%'],
            rose:    ['346 72% 48%', '346 82% 66%'],
            cyan:    ['191 82% 35%', '189 78% 55%']
          };
          var pair = ACCENTS[state.accent];
          if (pair) {
            var value = dark ? pair[1] : pair[0];
            ['--primary', '--ring', '--sidebar-primary', '--sidebar-ring']
              .forEach(function(v) { root.style.setProperty(v, value); });
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
