name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          activate-environment: true
          python-version: "3.12"

      - name: Install lint tooling
        # No --system: setup-uv creates and activates a .venv, so install into
        # it and let the .venv's ruff/mypy/python resolve on PATH.
        # ruff is pinned exactly so the Phase Q complexity/security ratchets
        # (which count findings) are reproducible between local runs and CI.
        run: uv pip install ruff==0.15.17 "mypy>=1.13.0"

      - name: Lint
        run: ruff check src/deepr/

      - name: Security + complexity lint (advisory display)
        # Advisory log of the S-rule (Bandit) and C901 (complexity > 10)
        # findings. The counts are *enforced* (no-growth) by the ratchet step
        # below; this keeps the individual findings visible during review.
        continue-on-error: true
        run: ruff check src/deepr/ --select S,C901

      - name: Code-health ratchets (BLOCKING)
        # Phase Q: the backlog may not grow. check_file_sizes.py fails on any
        # new oversized src/deepr/*.py (existing large files grandfathered, shrink
        # only); check_ratchets.py fails if the C901 or S finding count rises
        # above its committed baseline. See docs/design/code-health.md.
        run: |
          python scripts/check_file_sizes.py
          python scripts/check_ratchets.py

      - name: Format check
        run: ruff format --check src/deepr/

      - name: Docs consistency (counts match source)
        run: python scripts/check_docs_consistency.py

      - name: Type check (mypy baseline, non-blocking)
        # Phase E (Engineering Standards): type checking is being introduced
        # incrementally. This runs non-blocking to record the baseline error
        # count in the CI log; it flips to a blocking `--strict` gate
        # package-by-package (core/, providers/, mcp/ first) as annotations
        # land. Config lives in [tool.mypy] in pyproject.toml.
        continue-on-error: true
        run: mypy

      - name: Type check strict islands (mypy --strict, BLOCKING)
        # Phase E: strict-clean islands enforced as a blocking gate - a strict
        # regression in these packages fails the build. core/ (kernel: budget,
        # cost, contracts, research orchestration) and providers/ (all adapters)
        # are clean; mcp/ is next.
        # --no-warn-unused-ignores: the lint job installs no project deps, so
        # whether a `# type: ignore[import-untyped]` is "used" depends on which
        # third-party packages are present (e.g. PyYAML). Decouple the gate
        # from that so it is reproducible regardless of the install set.
        run: mypy --strict --no-warn-unused-ignores --ignore-missing-imports src/deepr/core src/deepr/providers src/deepr/mcp

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          activate-environment: true
          python-version: "3.12"

      - name: Dependency audit (pip-audit, blocking)
        # Phase E: BLOCKING. The baseline was cleared (flask-cors bumped past
        # CVE-2024-6839/6844/6866), so a new known vulnerability fails the
        # build. Accepted advisories are pinned explicitly with
        # `--ignore-vuln <ID>` rather than by disabling the gate.
        run: |
          uv pip install -e ".[full]" "pip-audit>=2.7.0"
          pip-audit --skip-editable

      - name: Generate SBOM (pinned dependency bill of materials)
        # Phase E: a reproducible, hash-pinned list of every resolved
        # dependency, published as a build artifact for supply-chain audit.
        run: uv export --frozen --no-emit-project --no-dev --format requirements-txt -o sbom-requirements.txt

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom-requirements
          path: sbom-requirements.txt
          if-no-files-found: error

  core-install:
    # The dev/test/[full] installs always include numpy, bs4, etc., so a broken
    # *core* install - a runtime import that lives only in an extra - cannot be
    # caught by the unit suite: it ships green and crashes on the user's first
    # command. This happened (numpy was in the `docs` extra but imported at CLI
    # startup, so `pip install deepr-research` produced a CLI that died on every
    # command). This job installs CORE ONLY and exercises the no-network command
    # surface, so that class fails here, not on a user's machine.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          activate-environment: true
          python-version: "3.12"

      - name: Install CORE only (no extras)
        run: uv pip install .

      - name: Smoke-test the core CLI (no network, no extras)
        run: |
          deepr --version
          deepr --help
          deepr doctor --skip-connectivity
          deepr init --yes

  frontend:
    # The web frontend was previously verified only by hand: CI never ran
    # lint/tsc/build, so a dangling identifier that broke type-checking and
    # a missing ESLint config both survived for months (found 2026-06-11
    # while verifying dependency bumps locally). This job closes that gap.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/deepr/web/frontend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/deepr/web/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint (eslint, zero warnings)
        run: npm run lint

      - name: Type check (tsc)
        run: npx tsc --noEmit

      - name: Production build (vite)
        run: npx vite build

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Floor is 3.12 (3.11 supported only to Oct 2027; 3.12 to Oct 2028 -
        # see Phase E). 3.14 promoted to blocking 2026-06-11: the full
        # [dev,full] extras install and the entire suite pass on it, so the
        # original wheel-availability caveat no longer applies.
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          activate-environment: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv pip install -e ".[dev,full]"

      - name: Unit tests with coverage
        # Coverage threshold lives in pyproject.toml (currently 80%).
        # Do NOT pass --cov-fail-under here — it would silently override
        # the pyproject setting and allow coverage to drop without
        # tripping CI (R4 audit caught this discrepancy).
        run: python -m pytest tests/unit/ --ignore=tests/data -q --tb=short --cov=deepr --cov-report=term-missing

      - name: Enforce coverage gate
        # pytest-cov printed "FAIL Required test coverage ..." on 3.12/3.13
        # without failing the step (observed 2026-06-11: jobs green at 79.75%
        # against an 80% gate; only 3.14 propagated the failure). Enforce the
        # gate explicitly and version-independently: `coverage report` reads
        # fail_under from pyproject (single source of truth) and exits 2 when
        # the total is below it.
        run: python -m coverage report > /dev/null
