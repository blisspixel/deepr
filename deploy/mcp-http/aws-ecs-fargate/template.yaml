AWSTemplateFormatVersion: '2010-09-09'
Description: Deepr hosted MCP HTTP endpoint on AWS ECS Fargate with durable EFS data.

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Environment name used in resource names.

  ContainerImage:
    Type: String
    Description: Container image built from deploy/mcp-http/Dockerfile.

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Existing VPC for the load balancer, tasks, and EFS mount targets.

  PublicSubnetIdA:
    Type: AWS::EC2::Subnet::Id
    Description: First public subnet for the internet-facing HTTPS load balancer.

  PublicSubnetIdB:
    Type: AWS::EC2::Subnet::Id
    Description: Second public subnet for the internet-facing HTTPS load balancer.

  TaskSubnetIdA:
    Type: AWS::EC2::Subnet::Id
    Description: First subnet for Fargate tasks and an EFS mount target.

  TaskSubnetIdB:
    Type: AWS::EC2::Subnet::Id
    Description: Second subnet for Fargate tasks and an EFS mount target.

  CertificateArn:
    Type: String
    MinLength: 1
    Description: ACM certificate ARN for the HTTPS listener.

  AllowedIngressCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR allowed to reach the HTTPS listener. Prefer remote-host egress ranges when known.

  InitialSharedAuthToken:
    Type: String
    NoEcho: true
    Default: ''
    Description: Optional first-boot shared token. Remove after scoped keys are present on EFS.

  AssignPublicIp:
    Type: String
    Default: DISABLED
    AllowedValues:
      - ENABLED
      - DISABLED
    Description: Whether Fargate tasks receive public IPs. Use DISABLED with private subnets plus NAT or VPC endpoints.

  DesiredCount:
    Type: Number
    Default: 0
    MinValue: 0
    MaxValue: 10
    Description: Desired task count. Keep 0 until EFS has scoped keys or a bootstrap token is set.

  MinTasks:
    Type: Number
    Default: 0
    MinValue: 0
    MaxValue: 10
    Description: Minimum autoscaled task count.

  MaxTasks:
    Type: Number
    Default: 3
    MinValue: 1
    MaxValue: 20
    Description: Maximum autoscaled task count.

  Cpu:
    Type: String
    Default: '1024'
    AllowedValues:
      - '512'
      - '1024'
      - '2048'
    Description: Fargate task CPU units.

  Memory:
    Type: String
    Default: '2048'
    AllowedValues:
      - '1024'
      - '2048'
      - '4096'
    Description: Fargate task memory in MiB.

  MaxConcurrentRequests:
    Type: Number
    Default: 32
    MinValue: 1
    MaxValue: 1000
    Description: Maximum simultaneous HTTP POST requests per Deepr MCP task before returning 429.

Conditions:
  HasBootstrapToken: !Not [!Equals [!Ref InitialSharedAuthToken, '']]

Resources:
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/ecs/deepr-mcp-http-${Environment}
      RetentionInDays: 30

  LoadBalancerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: HTTPS ingress for Deepr hosted MCP.
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref AllowedIngressCidr
          Description: HTTPS from remote MCP callers.
      SecurityGroupEgress: []
      Tags:
        - Key: Environment
          Value: !Ref Environment

  TaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Deepr MCP Fargate task security group.
      VpcId: !Ref VpcId
      SecurityGroupEgress: []
      Tags:
        - Key: Environment
          Value: !Ref Environment

  EfsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EFS mount target access for Deepr MCP tasks.
      VpcId: !Ref VpcId
      SecurityGroupEgress: []
      Tags:
        - Key: Environment
          Value: !Ref Environment

  LoadBalancerToTaskEgress:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref LoadBalancerSecurityGroup
      IpProtocol: tcp
      FromPort: 8765
      ToPort: 8765
      DestinationSecurityGroupId: !Ref TaskSecurityGroup
      Description: Forward MCP HTTP traffic to Fargate tasks.

  LoadBalancerToTaskIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref TaskSecurityGroup
      IpProtocol: tcp
      FromPort: 8765
      ToPort: 8765
      SourceSecurityGroupId: !Ref LoadBalancerSecurityGroup
      Description: MCP HTTP from the load balancer.

  TaskHttpsEgress:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref TaskSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      CidrIp: 0.0.0.0/0
      Description: HTTPS outbound for image pulls, provider calls, and AWS APIs.

  TaskToEfsEgress:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref TaskSecurityGroup
      IpProtocol: tcp
      FromPort: 2049
      ToPort: 2049
      DestinationSecurityGroupId: !Ref EfsSecurityGroup
      Description: NFS to EFS.

  TaskToEfsIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref EfsSecurityGroup
      IpProtocol: tcp
      FromPort: 2049
      ToPort: 2049
      SourceSecurityGroupId: !Ref TaskSecurityGroup
      Description: NFS from Deepr MCP tasks.

  DataFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      BackupPolicy:
        Status: ENABLED
      FileSystemTags:
        - Key: Name
          Value: !Sub deepr-mcp-data-${Environment}
        - Key: Environment
          Value: !Ref Environment

  DataAccessPoint:
    Type: AWS::EFS::AccessPoint
    Properties:
      FileSystemId: !Ref DataFileSystem
      PosixUser:
        Uid: '1000'
        Gid: '1000'
      RootDirectory:
        Path: /deepr-data
        CreationInfo:
          OwnerUid: '1000'
          OwnerGid: '1000'
          Permissions: '0750'

  DataMountTargetA:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref DataFileSystem
      SubnetId: !Ref TaskSubnetIdA
      SecurityGroups:
        - !Ref EfsSecurityGroup

  DataMountTargetB:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref DataFileSystem
      SubnetId: !Ref TaskSubnetIdB
      SecurityGroups:
        - !Ref EfsSecurityGroup

  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub deepr-mcp-http-${Environment}
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Tags:
        - Key: Environment
          Value: !Ref Environment

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Tags:
        - Key: Environment
          Value: !Ref Environment

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EfsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - elasticfilesystem:ClientMount
                  - elasticfilesystem:ClientWrite
                Resource: !GetAtt DataFileSystem.Arn
      Tags:
        - Key: Environment
          Value: !Ref Environment

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    DependsOn:
      - DataMountTargetA
      - DataMountTargetB
    Properties:
      Family: !Sub deepr-mcp-http-${Environment}
      Cpu: !Ref Cpu
      Memory: !Ref Memory
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: deepr-mcp-http
          Image: !Ref ContainerImage
          Essential: true
          User: '1000:1000'
          PortMappings:
            - ContainerPort: 8765
              Protocol: tcp
          Command:
            - mcp
            - serve
            - --http
            - --host
            - 0.0.0.0
            - --port
            - '8765'
            - --path
            - /mcp
            - --keys-path
            - /data/security/mcp_keys.json
            - --max-concurrency
            - !Sub '${MaxConcurrentRequests}'
          Environment:
            - Name: DEEPR_DATA_DIR
              Value: /data
            - Name: DEEPR_REPORTS_PATH
              Value: /data/reports
            - Name: DEEPR_MCP_KEYS_PATH
              Value: /data/security/mcp_keys.json
            - Name: DEEPR_MCP_HTTP_MAX_CONCURRENCY
              Value: !Sub '${MaxConcurrentRequests}'
            - Name: DEEPR_COST_TRACKING_STRICT
              Value: '1'
            - Name: LOG_LEVEL
              Value: INFO
            - !If
              - HasBootstrapToken
              - Name: DEEPR_MCP_AUTH_TOKEN
                Value: !Ref InitialSharedAuthToken
              - !Ref AWS::NoValue
          MountPoints:
            - SourceVolume: deepr-data
              ContainerPath: /data
              ReadOnly: false
          HealthCheck:
            Command:
              - CMD-SHELL
              - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/mcp/health', timeout=3).read()"
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 30
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: deepr-mcp-http
      Volumes:
        - Name: deepr-data
          EFSVolumeConfiguration:
            FilesystemId: !Ref DataFileSystem
            TransitEncryption: ENABLED
            AuthorizationConfig:
              AccessPointId: !Ref DataAccessPoint
              IAM: ENABLED
      Tags:
        - Key: Environment
          Value: !Ref Environment

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnetIdA
        - !Ref PublicSubnetIdB
      SecurityGroups:
        - !Ref LoadBalancerSecurityGroup
      LoadBalancerAttributes:
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: 'true'
        - Key: routing.http2.enabled
          Value: 'true'
      Tags:
        - Key: Environment
          Value: !Ref Environment

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !Ref VpcId
      TargetType: ip
      Protocol: HTTP
      Port: 8765
      HealthCheckEnabled: true
      HealthCheckProtocol: HTTP
      HealthCheckPath: /mcp/health
      Matcher:
        HttpCode: '200'
      Tags:
        - Key: Environment
          Value: !Ref Environment

  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  Service:
    Type: AWS::ECS::Service
    DependsOn:
      - HttpsListener
    Properties:
      ServiceName: !Sub deepr-mcp-http-${Environment}
      Cluster: !Ref Cluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      EnableExecuteCommand: false
      HealthCheckGracePeriodSeconds: 60
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: !Ref AssignPublicIp
          Subnets:
            - !Ref TaskSubnetIdA
            - !Ref TaskSubnetIdB
          SecurityGroups:
            - !Ref TaskSecurityGroup
      LoadBalancers:
        - ContainerName: deepr-mcp-http
          ContainerPort: 8765
          TargetGroupArn: !Ref TargetGroup
      Tags:
        - Key: Environment
          Value: !Ref Environment

  ScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MinCapacity: !Ref MinTasks
      MaxCapacity: !Ref MaxTasks
      ResourceId: !Sub service/${Cluster}/${Service.Name}
      RoleARN: !Sub arn:aws:iam::${AWS::AccountId}:role/aws-service-role/ecs.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_ECSService
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  CpuScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub deepr-mcp-http-cpu-${Environment}
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 70
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

Outputs:
  LoadBalancerDnsName:
    Description: HTTPS load balancer DNS name.
    Value: !GetAtt LoadBalancer.DNSName

  McpEndpoint:
    Description: Hosted MCP endpoint path on the HTTPS load balancer.
    Value: !Sub https://${LoadBalancer.DNSName}/mcp

  ClusterName:
    Description: ECS cluster name.
    Value: !Ref Cluster

  ServiceName:
    Description: ECS service name.
    Value: !GetAtt Service.Name

  DataFileSystemId:
    Description: EFS file system that stores Deepr data, scoped keys, and remote audit logs.
    Value: !Ref DataFileSystem

  DataAccessPointId:
    Description: EFS access point mounted as /data in the container.
    Value: !Ref DataAccessPoint
